<h4>WORK</h4>
<div class = "work" *ngFor = "let position of positions">
    <p *ngIf="position.links != ''"><a href = "{{position.links}}">{{position.title}}</a></p>
    <p *ngIf="position.links == ''">{{position.title}}</p>
    <p class = "details-1">{{position.detail1}}</p>
    <p class = "details-2">{{position.detail2}}</p>
</div>
